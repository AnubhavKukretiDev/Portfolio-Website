    <div class="particles">
      <div class="layer back"></div>
      <div class="layer mid"></div>
      <div class="layer front"></div>
    </div>  


    <script>
      function createParticles(layer, count, speedMin, speedMax) {
        const container = document.querySelector(layer);

        for (let i = 0; i < count; i++) {
          const span = document.createElement('span');

          span.style.left = Math.random() * 100 + 'vw';
          span.style.animationDuration =
            (speedMin + Math.random() * (speedMax - speedMin)) + 's';
          span.style.animationDelay = Math.random() * 20 + 's';
          span.style.opacity = Math.random();

          container.appendChild(span);
        }
      }

      createParticles('.back', 40, 20, 40);   // slow = far
      createParticles('.mid', 30, 12, 25);    // medium
      createParticles('.front', 20, 8, 15);   // fast = close
    </script>
